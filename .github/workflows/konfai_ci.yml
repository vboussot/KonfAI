name: konfai_ci

on:
  push:
    paths:
      - ".github/workflows/konfai_ci.yml"
      - "konfai/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/konfai_ci.yml"
      - "konfai/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"

jobs:
  konfai_ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      
      - name: Run pytest
        run: |
          pytest -q tests
