name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: konfai
            pkg: "."
          - name: konfai-apps
            pkg: "konfai-apps"
          - name: impact-synth-konfai
            pkg: "apps/impact_synth"
          - name: mrsegmentator-konfai
            pkg: "apps/mrsegmentator"
          - name: totalsegmentator-konfai
            pkg: "apps/totalsegmentator"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build package
        run: |
          python -m pip install -U pip
          python -m pip install build setuptools-scm
          cd "${{ matrix.pkg }}"
          python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: ${{ matrix.pkg }}/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist_all

      - name: Flatten dists
        run: |
          mkdir -p dist
          find dist_all -type f \( -name "*.whl" -o -name "*.tar.gz" \) -print0 | xargs -0 -I {} cp {} dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish_docker:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Derive package version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI release to be available
        run: |
          version="${{ steps.version.outputs.value }}"
          for attempt in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/konfai/${version}/json" >/dev/null; then
              exit 0
            fi
            echo "konfai ${version} is not available on PyPI yet (attempt ${attempt}/30)"
            sleep 10
          done
          echo "konfai ${version} was not available on PyPI after 5 minutes"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vboussot/konfai
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KONFAI_PYPI_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
