exclude: ^(?:\.pixi/|docs/_build/|dist/|.*\.egg-info/)

default_install_hook_types:
  - pre-commit
  - commit-msg

default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^apps/mrsegmentator/README\.md$
      - id: mixed-line-ending
        exclude: ^apps/mrsegmentator/README\.md$
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^apps/mrsegmentator/README\.md$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(konfai/|konfai-apps/konfai_apps/|scripts/)
      - id: ruff-format
        files: ^(konfai/|konfai-apps/konfai_apps/|scripts/)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
        files: ^konfai/
        args:
          - --ignore-missing-imports
          - --check-untyped-defs
          - --install-types
          - --non-interactive

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-r", "konfai", "konfai-apps/konfai_apps"]
        files: ^(konfai/|konfai-apps/konfai_apps/)
        exclude: ^(tests/|konfai-apps/tests/)
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: forbid-agent-commit-branding
        name: Forbid AI agent branding in commit messages
        entry: python scripts/check_commit_message.py
        language: python
        stages: [commit-msg]
