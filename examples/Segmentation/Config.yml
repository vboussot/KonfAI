Trainer:
  Model:
    classpath: segmentation.UNet.UNet
    UNet:
      dim: 2
      channels:
      - 1
      - 32
      - 64
      - 128
      - 256
      nb_class: 41
      outputs_criterions:
        UNetBlock_0:Head:Conv:
          targets_criterions:
            SEG:
              criterions_loader:
                CrossEntropyLoss:
                  is_loss: true
                  schedulers:
                    Constant:
                      nb_step: 0
                      value: 1
                  group: 0
                  start: 0
                  stop: None
                  accumulation: false
                  weight: None
                  reduction: mean
      optimizer:
        name: AdamW
        lr: 0.001
        weight_decay: 0.0001
        betas:
        - 0.9
        - 0.999
        eps: 1e-08
        amsgrad: false
        maximize: false
        foreach: None
        capturable: false
        differentiable: false
        fused: None
      schedulers:
        StepLR:
          step_size: 20
          gamma: 0.5
          last_epoch: -1
          verbose: deprecated
          nb_step: 0
      BlockConfig:
        kernel_size: 3
        stride: 1
        padding: 1
        bias: true
        activation: ReLU
        norm_mode: NONE
      nb_conv_per_stage: 2
      downsample_mode: MAXPOOL
      upsample_mode: CONV_TRANSPOSE
      attention: false
      block_type: Conv
      ModelPatch: None
  Dataset:
    groups_src:
      CT:
        groups_dest:
          CT:
            transforms:
              Standardize:
                lazy: false
                mean: None
                std: None
                mask: None
                inverse: false
            patch_transforms: None
            is_input: true
      SEG:
        groups_dest:
          SEG:
            transforms:
              TensorCast:
                dtype: int64
                inverse: false
            patch_transforms: None
            is_input: false
    augmentations:
      DataAugmentation_0:
        data_augmentations:
          Flip:
            f_prob:
            - 0
            - 0.5
            - 0.5
            prob: 1
        nb: 1
    Patch:
      patch_size:
      - 1
      - 256
      - 256
      overlap: None
      mask: None
      pad_value: 0
      extend_slice: 0
    subset: None
    shuffle: true
    filter: None
    dataset_filenames:
    - ./Dataset:a:mha
    inline_augmentations: true
    use_cache: true
    batch_size: 8
    validation: 0.2
  train_name: SEG_BASELINE
  manual_seed: 32
  epochs: 100
  it_validation: 500
  autocast: false
  gradient_checkpoints: None
  gpu_checkpoints: None
  ema_decay: 0
  data_log: None
  save_checkpoint_mode: BEST
  EarlyStopping: None
