# Declarative KonfAI UNet used by Config.yml and Prediction.yml.
name: UNet

parameters:
  dim: 2
  channels: [1, 32, 64, 128, 256]
  nb_class: 41
  block_configs:
    - $object: BlockConfig
      args: &block_config
        kernel_size: 3
        stride: 1
        padding: 1
        bias: true
        activation: ReLU
        norm_mode: NONE
    - $object: BlockConfig
      args: *block_config

network:
  in_channels: ${channels.0}
  dim: ${dim}

modules:
  - name: UNetBlock_0
    modules:
      - name: DownConvBlock
        type: ConvBlock
        args:
          in_channels: ${channels.0}
          out_channels: ${channels.1}
          block_configs: ${block_configs}
          dim: ${dim}

      - name: UNetBlock_1
        modules:
          - name: MAXPOOL
            type: MaxPool
            args:
              dim: ${dim}
              kernel_size: 2
              stride: 2
          - name: DownConvBlock
            type: ConvBlock
            args:
              in_channels: ${channels.1}
              out_channels: ${channels.2}
              block_configs: ${block_configs}
              dim: ${dim}

          - name: UNetBlock_2
            modules:
              - name: MAXPOOL
                type: MaxPool
                args:
                  dim: ${dim}
                  kernel_size: 2
                  stride: 2
              - name: DownConvBlock
                type: ConvBlock
                args:
                  in_channels: ${channels.2}
                  out_channels: ${channels.3}
                  block_configs: ${block_configs}
                  dim: ${dim}

              - name: UNetBlock_3
                modules:
                  - name: MAXPOOL
                    type: MaxPool
                    args:
                      dim: ${dim}
                      kernel_size: 2
                      stride: 2
                  - name: DownConvBlock
                    type: ConvBlock
                    args:
                      in_channels: ${channels.3}
                      out_channels: ${channels.4}
                      block_configs: ${block_configs}
                      dim: ${dim}
                  - name: CONV_TRANSPOSE
                    type: ConvTranspose
                    args:
                      dim: ${dim}
                      in_channels: ${channels.4}
                      out_channels: ${channels.3}
                      kernel_size: 2
                      stride: 2
                  - name: SkipConnection
                    type: Concat
                    in_branch: [0, 1]

              - name: UpConvBlock
                type: ConvBlock
                args:
                  in_channels:
                    $multiply: ["${channels.3}", 2]
                  out_channels: ${channels.3}
                  block_configs: ${block_configs}
                  dim: ${dim}
              - name: Head
                out_branch: [-1]
                modules:
                  - name: Conv
                    type: Conv
                    args:
                      dim: ${dim}
                      in_channels: ${channels.3}
                      out_channels: ${nb_class}
                      kernel_size: 1
                  - name: Softmax
                    type: Softmax
                    args:
                      dim: 1
                  - name: Argmax
                    type: ArgMax
                    args:
                      dim: 1
              - name: CONV_TRANSPOSE
                type: ConvTranspose
                args:
                  dim: ${dim}
                  in_channels: ${channels.3}
                  out_channels: ${channels.2}
                  kernel_size: 2
                  stride: 2
              - name: SkipConnection
                type: Concat
                in_branch: [0, 1]

          - name: UpConvBlock
            type: ConvBlock
            args:
              in_channels:
                $multiply: ["${channels.2}", 2]
              out_channels: ${channels.2}
              block_configs: ${block_configs}
              dim: ${dim}
          - name: Head
            out_branch: [-1]
            modules:
              - name: Conv
                type: Conv
                args:
                  dim: ${dim}
                  in_channels: ${channels.2}
                  out_channels: ${nb_class}
                  kernel_size: 1
              - name: Softmax
                type: Softmax
                args:
                  dim: 1
              - name: Argmax
                type: ArgMax
                args:
                  dim: 1
          - name: CONV_TRANSPOSE
            type: ConvTranspose
            args:
              dim: ${dim}
              in_channels: ${channels.2}
              out_channels: ${channels.1}
              kernel_size: 2
              stride: 2
          - name: SkipConnection
            type: Concat
            in_branch: [0, 1]

      - name: UpConvBlock
        type: ConvBlock
        args:
          in_channels:
            $multiply: ["${channels.1}", 2]
          out_channels: ${channels.1}
          block_configs: ${block_configs}
          dim: ${dim}
      - name: Head
        out_branch: [-1]
        modules:
          - name: Conv
            type: Conv
            args:
              dim: ${dim}
              in_channels: ${channels.1}
              out_channels: ${nb_class}
              kernel_size: 1
          - name: Softmax
            type: Softmax
            args:
              dim: 1
          - name: Argmax
            type: ArgMax
            args:
              dim: 1
